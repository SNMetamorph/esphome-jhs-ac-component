esphome:
  name: honeywell-ac
  friendly_name: "Honeywell AC"

esp8266:
  board: d1_mini

# Enable logging
logger:

# Enable Home Assistant API
api:
  encryption:
    key: "your-encryption-key"

ota:
  - platform: esphome
    password: "your-ota-password"

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Honeywell AC Hotspot"
    password: "your-ap-password"

captive_portal:

uart:
  tx_pin: GPIO15
  rx_pin: GPIO13
  baud_rate: 9600
  data_bits: 8
  parity: NONE
  stop_bits: 1

external_components:
  - source: github://SNMetamorph/esphome-jhs-ac-component@master
    components: [ jhs_ac ]
    refresh: 0s

climate:
  - platform: jhs_ac
    name: "HJ14CESVWK"
    protocol_version: 1
    supported_modes:
      - COOL
      - DRY
      - FAN_ONLY
    supported_fan_modes:
      - LOW
      - MEDIUM
      - HIGH
    supported_swing_modes:
      - VERTICAL
    water_tank_status:
      name: Water Tank Status
