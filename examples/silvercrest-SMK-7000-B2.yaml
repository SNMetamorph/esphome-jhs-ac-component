# Board: ESP32-C3 Super Mini (Generic)
# Definition: definitions/boards/esp32-c3-supermini/manifest.yaml

esphome:
  name: klimaanlage
  friendly_name: Klimaanlage

esp32:
  variant: esp32c3
  flash_size: 4MB
  framework:
    type: esp-idf

logger:

api:
  encryption:
    key: "your-encryption-key"

ota:
  - platform: esphome

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  output_power: 8.5dB
  ap:
    ssid: Klimaanlage Fallback Hotspot
    password: "your-ap-password"

captive_portal:

web_server:
  port: 80  
  
external_components:
  - source: github://SNMetamorph/esphome-jhs-ac-component@master
    components: [ jhs_ac ]
    refresh: 0s

uart:
  - baud_rate: 9600
    rx_pin: GPIO21
    tx_pin: GPIO20
    data_bits: 8
    parity: NONE
    stop_bits: 1
    id: uart_1


climate:
  - platform: jhs_ac
    uart_id: uart_1
    name: "Silvercrest SMK 7000 B2"
    protocol_version: 1
    supported_modes:
      - COOL
      - DRY
      - FAN_ONLY
    supported_fan_modes:
      - LOW
      - HIGH
    supported_swing_modes:
      - VERTICAL